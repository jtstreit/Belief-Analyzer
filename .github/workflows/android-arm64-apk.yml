name: Build Android arm64 APK

on:
  workflow_dispatch:
  push:
    branches:
      - codex/belief-linux-apk

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      CI: "1"
      EXPO_NO_TELEMETRY: "1"

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.11.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.4
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tooling
        run: >-
          sdkmanager
          "platform-tools"
          "platforms;android-36"
          "build-tools;36.0.0"
          "ndk;27.1.12297006"
          "cmake;3.22.1"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Install pinned dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate the Android project
        working-directory: artifacts/rebt-app
        run: pnpm exec expo prebuild --platform android --clean --no-install

      - name: Build release APK for arm64-v8a
        working-directory: artifacts/rebt-app/android
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace -PreactNativeArchitectures=arm64-v8a

      - name: Stage and check APK architecture
        shell: bash
        run: |
          source_apk="artifacts/rebt-app/android/app/build/outputs/apk/release/app-release.apk"
          output_apk="dist/belief-analyzer-1.1.0-arm64-v8a.apk"
          test -f "$source_apk"
          mkdir -p dist
          cp "$source_apk" "$output_apk"

          mapfile -t packaged_abis < <(
            unzip -Z1 "$output_apk" |
              sed -n 's#^lib/\([^/]*\)/.*#\1#p' |
              sort -u
          )
          printf 'Packaged ABIs: %s\n' "${packaged_abis[*]}"
          test "${#packaged_abis[@]}" -eq 1
          test "${packaged_abis[0]}" = "arm64-v8a"
          sha256sum "$output_apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: belief-analyzer-1.1.0-arm64-v8a
          path: dist/belief-analyzer-1.1.0-arm64-v8a.apk
          if-no-files-found: error
          retention-days: 14
