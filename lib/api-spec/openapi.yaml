openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: REBT Companion API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: telemetry
    description: Phone telemetry and check-in events
  - name: sentinel
    description: PHI-filtered LifeOps telemetry ingestion
  - name: beliefs
    description: Identified irrational beliefs
  - name: patterns
    description: Pattern analysis from telemetry
  - name: cognitive
    description: Layered cognitive conceptualization engine (automatic thoughts → intermediate beliefs → core schemas)
  - name: openai
    description: OpenAI AI chat operations
  - name: exercises
    description: Exercise session logging
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /telemetry:
    get:
      operationId: listTelemetry
      tags: [telemetry]
      summary: List recent telemetry events
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: type
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of telemetry events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TelemetryEvent"
    post:
      operationId: createTelemetry
      tags: [telemetry]
      summary: Log a telemetry event (mood check-in, thought entry, app usage)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TelemetryEventInput"
      responses:
        "201":
          description: Created telemetry event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TelemetryEvent"

  /telemetry/batch:
    post:
      operationId: createTelemetryBatch
      tags: [telemetry]
      summary: Ingest a batch of telemetry events (e.g. a burst from NotificationListenerService)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TelemetryBatchInput"
      responses:
        "201":
          description: Created telemetry events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TelemetryEvent"

  /sentinel/status:
    get:
      operationId: getSentinelStatus
      tags: [sentinel]
      summary: Get LifeOps ingestion and Opus analysis status
      responses:
        "200":
          description: LifeOps adapter status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SentinelStatus"

  /sentinel/sync:
    post:
      operationId: syncSentinel
      tags: [sentinel]
      summary: Pull new LifeOps screen signals through the PHI filter
      responses:
        "200":
          description: Aggregate sync result; raw filtered content is never returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SentinelSyncResult"

  /beliefs:
    get:
      operationId: listBeliefs
      tags: [beliefs]
      summary: List identified irrational beliefs
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: beliefType
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of beliefs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Belief"
    post:
      operationId: createBelief
      tags: [beliefs]
      summary: Create a new identified irrational belief
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BeliefInput"
      responses:
        "201":
          description: Created belief
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Belief"

  /beliefs/{id}:
    get:
      operationId: getBelief
      tags: [beliefs]
      summary: Get a specific belief
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Belief detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Belief"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    patch:
      operationId: updateBelief
      tags: [beliefs]
      summary: Update a belief status or link to conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BeliefUpdate"
      responses:
        "200":
          description: Updated belief
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Belief"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /patterns:
    get:
      operationId: getPatterns
      tags: [patterns]
      summary: Get aggregated belief pattern summary
      responses:
        "200":
          description: Pattern analysis summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatternSummary"

  /patterns/analyze:
    post:
      operationId: analyzePatterns
      tags: [patterns]
      summary: Trigger LLM analysis of recent telemetry to detect belief patterns
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzePatternsInput"
      responses:
        "200":
          description: Detected beliefs from telemetry
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Belief"

  /cognitive/analyze:
    post:
      operationId: analyzeCognitive
      tags: [cognitive]
      summary: Run the layered cognitive engine on all unprocessed telemetry
      description: >
        Extracts automatic thoughts with distortion tags, synthesizes intermediate
        beliefs (rules/assumptions/attitudes), and infers core schemas
        (helpless/unlovable/worthless). Idempotent — re-running deepens confidence
        and evidence counts rather than creating duplicates.
      responses:
        "200":
          description: Updated cognitive mind map after analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CognitiveMindMap"

  /cognitive/map:
    get:
      operationId: getCognitiveMap
      tags: [cognitive]
      summary: Get the full four-layer cognitive conceptualization
      responses:
        "200":
          description: Four-layer cognitive mind map
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CognitiveMindMap"

  /cognitive/automatic-thoughts:
    get:
      operationId: listAutomaticThoughts
      tags: [cognitive]
      summary: List extracted automatic thoughts (Layer 1)
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: List of automatic thoughts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AutomaticThought"

  /cognitive/intermediate-beliefs:
    get:
      operationId: listIntermediateBeliefs
      tags: [cognitive]
      summary: List intermediate beliefs — rules, assumptions, attitudes (Layer 2)
      responses:
        "200":
          description: List of intermediate beliefs ordered by confidence
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IntermediateBelief"

  /cognitive/core-schemas:
    get:
      operationId: listCoreSchemas
      tags: [cognitive]
      summary: List core schemas — helpless / unlovable / worthless (Layer 3)
      responses:
        "200":
          description: List of core schemas ordered by confidence
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CoreSchema"

  /cognitive/intermediate-beliefs/{id}:
    delete:
      operationId: dismissIntermediateBelief
      tags: [cognitive]
      summary: Dismiss an intermediate belief — soft delete; re-analysis cannot resurrect it
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Dismissed
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /cognitive/core-schemas/{id}:
    delete:
      operationId: dismissCoreSchema
      tags: [cognitive]
      summary: Dismiss a core schema — soft delete; re-analysis cannot resurrect it
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Dismissed
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /openai/conversations:
    get:
      operationId: listOpenaiConversations
      tags: [openai]
      summary: List all coaching conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiConversation"
    post:
      operationId: createOpenaiConversation
      tags: [openai]
      summary: Start a new coaching conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenaiConversationInput"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversation"

  /openai/conversations/{id}:
    get:
      operationId: getOpenaiConversation
      tags: [openai]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteOpenaiConversation
      tags: [openai]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /openai/conversations/{id}/messages:
    get:
      operationId: listOpenaiMessages
      tags: [openai]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiMessage"
    post:
      operationId: sendOpenaiMessage
      tags: [openai]
      summary: Send a message and receive a streaming coaching response
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenaiMessageInput"
      responses:
        "200":
          description: SSE stream of assistant text chunks
          content:
            text/event-stream: {}

  /progress:
    get:
      operationId: getProgress
      tags: [patterns]
      summary: Get aggregated progress stats — mood trend, exercise counts, belief funnel, streaks
      responses:
        "200":
          description: Progress summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProgressSummary"

  /exercises:
    get:
      operationId: listExercises
      tags: [exercises]
      summary: List exercise definitions — the catalog is served from the DB as source of truth
      parameters:
        - name: modality
          in: query
          description: Filter to exercises usable in this modality ("rebt" or "cbt"; includes "both")
          schema:
            type: string
      responses:
        "200":
          description: Ordered list of exercise definitions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Exercise"

  /exercise-sessions:
    get:
      operationId: listExerciseSessions
      tags: [exercises]
      summary: List exercise sessions
      parameters:
        - name: exerciseId
          in: query
          schema:
            type: string
        - name: modality
          in: query
          schema:
            type: string
        - name: completed
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of exercise sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExerciseSession"
    post:
      operationId: createExerciseSession
      tags: [exercises]
      summary: Create a new exercise session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExerciseSessionInput"
      responses:
        "201":
          description: Created exercise session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExerciseSession"

  /exercise-sessions/{id}:
    get:
      operationId: getExerciseSession
      tags: [exercises]
      summary: Get a specific exercise session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Exercise session detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExerciseSession"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    patch:
      operationId: updateExerciseSession
      tags: [exercises]
      summary: Update an exercise session (save progress or complete)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExerciseSessionUpdate"
      responses:
        "200":
          description: Updated exercise session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExerciseSession"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    AnalyzePatternsInput:
      type: object
      properties:
        modality:
          type: string
          enum: [rebt, cbt]
      required:
        - modality

    TelemetryEvent:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
        mood:
          type: ["string", "null"]
        thoughtText:
          type: ["string", "null"]
        source:
          type: ["string", "null"]
        processedAt:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - type
        - createdAt

    TelemetryEventInput:
      type: object
      properties:
        type:
          type: string
        mood:
          type: string
        thoughtText:
          type: string
        source:
          type: string
      required:
        - type

    TelemetryBatchInput:
      type: object
      properties:
        events:
          type: array
          items:
            $ref: "#/components/schemas/TelemetryEventInput"
      required:
        - events

    SentinelStatus:
      type: object
      properties:
        configured:
          type: boolean
        source:
          type: string
        model:
          type: string
        clinicalFilterEnabled:
          type: boolean
        lastSyncAt:
          type: ["string", "null"]
          format: date-time
        lastSyncCount:
          type: integer
        lastSyncError:
          type: ["string", "null"]
      required:
        - configured
        - source
        - model
        - clinicalFilterEnabled
        - lastSyncCount

    SentinelSyncResult:
      type: object
      properties:
        received:
          type: integer
        eligible:
          type: integer
        ingested:
          type: integer
        skippedDuplicates:
          type: integer
        filteredClinical:
          type: integer
        filteredLocation:
          type: integer
        filteredUnsupported:
          type: integer
        filteredNoContent:
          type: integer
        filteredInvalid:
          type: integer
        syncedAt:
          type: string
          format: date-time
      required:
        - received
        - eligible
        - ingested
        - skippedDuplicates
        - filteredClinical
        - filteredLocation
        - filteredUnsupported
        - filteredNoContent
        - filteredInvalid
        - syncedAt

    AutomaticThought:
      type: object
      properties:
        id:
          type: integer
        situation:
          type: ["string", "null"]
        thoughtText:
          type: string
        emotion:
          type: ["string", "null"]
        intensityPct:
          type: ["integer", "null"]
        distortionTags:
          type: array
          items:
            type: string
        telemetryEventId:
          type: ["integer", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - thoughtText
        - distortionTags
        - createdAt

    IntermediateBelief:
      type: object
      properties:
        id:
          type: integer
        beliefText:
          type: string
        category:
          type: string
        confidence:
          type: integer
        evidenceCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - beliefText
        - category
        - confidence
        - evidenceCount
        - createdAt
        - updatedAt

    CoreSchema:
      type: object
      properties:
        id:
          type: integer
        schemaText:
          type: string
        domain:
          type: string
        confidence:
          type: integer
        evidenceCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - schemaText
        - domain
        - confidence
        - evidenceCount
        - createdAt
        - updatedAt

    CognitiveMindMap:
      type: object
      properties:
        automaticThoughts:
          type: array
          items:
            $ref: "#/components/schemas/AutomaticThought"
        intermediateBeliefs:
          type: array
          items:
            $ref: "#/components/schemas/IntermediateBelief"
        coreSchemas:
          type: array
          items:
            $ref: "#/components/schemas/CoreSchema"
        unprocessedCount:
          type: integer
        lastAnalyzedAt:
          type: ["string", "null"]
          format: date-time
      required:
        - automaticThoughts
        - intermediateBeliefs
        - coreSchemas
        - unprocessedCount

    Belief:
      type: object
      properties:
        id:
          type: integer
        beliefText:
          type: string
        beliefType:
          type: string
        triggerSituation:
          type: ["string", "null"]
        emotionalConsequence:
          type: ["string", "null"]
        status:
          type: string
        conversationId:
          type: ["integer", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - beliefText
        - beliefType
        - status
        - createdAt
        - updatedAt

    BeliefInput:
      type: object
      properties:
        beliefText:
          type: string
        beliefType:
          type: string
        triggerSituation:
          type: string
        emotionalConsequence:
          type: string
        status:
          type: string
        conversationId:
          type: integer
      required:
        - beliefText
        - beliefType

    BeliefUpdate:
      type: object
      properties:
        status:
          type: string
        conversationId:
          type: integer
        beliefText:
          type: string
        triggerSituation:
          type: string
        emotionalConsequence:
          type: string

    PatternSummary:
      type: object
      properties:
        totalBeliefs:
          type: integer
        activeBeliefs:
          type: integer
        resolvedBeliefs:
          type: integer
        byType:
          type: array
          items:
            $ref: "#/components/schemas/BeliefTypeCount"
        recentStreak:
          type: integer
        lastAnalyzedAt:
          type: ["string", "null"]
          format: date-time
      required:
        - totalBeliefs
        - activeBeliefs
        - resolvedBeliefs
        - byType
        - recentStreak

    BeliefTypeCount:
      type: object
      properties:
        beliefType:
          type: string
        count:
          type: integer
      required:
        - beliefType
        - count

    MoodTrendPoint:
      type: object
      properties:
        date:
          type: string
        avgBefore:
          type: number
        avgAfter:
          type: number
      required:
        - date
        - avgBefore
        - avgAfter

    ExerciseModalityCount:
      type: object
      properties:
        modality:
          type: string
        count:
          type: integer
      required:
        - modality
        - count

    ExerciseTypeCount:
      type: object
      properties:
        exerciseId:
          type: string
        count:
          type: integer
      required:
        - exerciseId
        - count

    BeliefFunnel:
      type: object
      properties:
        active:
          type: integer
        challenged:
          type: integer
        resolved:
          type: integer
      required:
        - active
        - challenged
        - resolved

    ProgressSummary:
      type: object
      properties:
        moodTrend:
          type: array
          items:
            $ref: "#/components/schemas/MoodTrendPoint"
        exercisesByModality:
          type: array
          items:
            $ref: "#/components/schemas/ExerciseModalityCount"
        exercisesByType:
          type: array
          items:
            $ref: "#/components/schemas/ExerciseTypeCount"
        beliefFunnel:
          $ref: "#/components/schemas/BeliefFunnel"
        currentStreak:
          type: integer
        longestStreak:
          type: integer
        totalCompleted:
          type: integer
      required:
        - moodTrend
        - exercisesByModality
        - exercisesByType
        - beliefFunnel
        - currentStreak
        - longestStreak
        - totalCompleted

    ApiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    OpenaiConversation:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        selectedBeliefId:
          type: integer
          nullable: true
        selectedAutomaticThoughtId:
          type: integer
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - createdAt

    OpenaiMessage:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - conversationId
        - role
        - content
        - createdAt

    OpenaiConversationInput:
      type: object
      properties:
        title:
          type: string
        beliefId:
          type: integer
        automaticThoughtId:
          type: integer
        modality:
          type: string
          description: "rebt or cbt — determines coach framework"
      required:
        - title

    OpenaiMessageInput:
      type: object
      properties:
        content:
          type: string
        modality:
          type: string
          description: "rebt or cbt — selects coach system prompt"
        exerciseContext:
          type: string
          description: "Optional context from a completed exercise to anchor the coaching"
      required:
        - content

    OpenaiConversationWithMessages:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        selectedBeliefId:
          type: integer
          nullable: true
        selectedAutomaticThoughtId:
          type: integer
          nullable: true
        createdAt:
          type: string
          format: date-time
        messages:
          type: array
          items:
            $ref: "#/components/schemas/OpenaiMessage"
      required:
        - id
        - title
        - createdAt
        - messages

    ExerciseStep:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        instruction:
          type: string
        type:
          type: string
          enum: [text, multiline, rating, suds, mood, choice, info]
        placeholder:
          type: string
        options:
          type: array
          items:
